<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐津城導覽</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .emoji { font-size: 56px; margin-bottom: 12px; }
    .day   { font-size: 13px; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
    h1     { font-size: 28px; margin: 0 0 6px; }
    .sub   { font-size: 14px; color: #ccc; margin-bottom: 32px; }
    audio  { width: 100%; border-radius: 12px; outline: none; }
    .hint  { margin-top: 20px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🏯</div>
    <div class="day">DAY 5 ・ 佐賀</div>
    <h1>唐津城</h1>
    <div class="sub">舞鶴城導覽解說</div>
    <audio controls autoplay
      src="https://raw.githubusercontent.com/anersontw/Travel-Guide/main/01唐津城.mp3">
      您的瀏覽器不支援音訊播放。
    </audio>
    <div class="hint">📶 建議連接 Wi-Fi 後再播放</div>
  </div>
</body>
</html>
